services:
  - type: web
    name: taskping
    runtime: node
    buildCommand: npm run build
    startCommand: npm run start-backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_KEY_1
        sync: false
      - key: GEMINI_KEY_2
        sync: false
